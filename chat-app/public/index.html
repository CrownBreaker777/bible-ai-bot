<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lumina Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f5f2;
      --surface:   #ffffff;
      --surface2:  #f0ede8;
      --border:    #e8e3dc;
      --text:      #1a1714;
      --text-muted:#8a8278;
      --text-light:#b5afa7;
      --accent:    #2d6a4f;
      --accent-lt: #e8f4ef;
      --accent-dk: #1e4d38;
      --user-bg:   #1a1714;
      --user-text: #f7f5f2;
      --ai-bg:     #ffffff;
      --ai-text:   #1a1714;
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
      --radius:    18px;
      --radius-sm: 10px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --transition:   all 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: white;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1;
    }

    .header-subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.02em;
      background: var(--surface2);
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Messages area ── */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 8px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 12px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    .empty-icon {
      width: 52px;
      height: 52px;
      background: var(--accent-lt);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .empty-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .empty-state h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--text);
      font-weight: 400;
    }

    .empty-state p {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-weight: 300;
      max-width: 240px;
      line-height: 1.6;
    }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      font-size: 0.8rem;
      color: var(--accent-dk);
      background: var(--accent-lt);
      border: 1px solid rgba(45,106,79,0.15);
      border-radius: 20px;
      padding: 7px 14px;
      cursor: pointer;
      font-weight: 400;
      transition: var(--transition);
      font-family: var(--font-body);
    }

    .suggestion-chip:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      animation: fadeUp 0.28s cubic-bezier(0.34,1.3,0.64,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { flex-direction: row-reverse; }
    .message.ai    { flex-direction: row; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 500;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: var(--user-bg);
      color: var(--user-text);
    }

    .message.ai .avatar {
      background: var(--accent);
      color: white;
    }

    .avatar svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bubble {
      max-width: min(75%, 480px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.65;
      font-weight: 400;
      box-shadow: var(--shadow);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 5px;
    }

    .message.ai .bubble {
      background: var(--ai-bg);
      color: var(--ai-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 18px;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-light);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.30s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Error message ── */
    .error-msg {
      font-size: 0.82rem;
      color: #c0392b;
      background: #fdf2f2;
      border: 1px solid #f5c6c6;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      max-width: min(75%, 480px);
    }

    /* ── Input bar ── */
    .input-area {
      padding: 12px 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 8px 8px 8px 16px;
      box-shadow: var(--shadow);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .input-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.08), var(--shadow);
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
      overflow-y: auto;
      padding: 3px 0;
      font-weight: 400;
    }

    textarea::placeholder {
      color: var(--text-light);
      font-weight: 300;
    }

    textarea::-webkit-scrollbar { display: none; }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--user-bg);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition);
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent);
      transform: scale(1.05);
    }

    .send-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transform: translateX(1px);
    }

    .char-hint {
      text-align: right;
      font-size: 0.68rem;
      color: var(--text-light);
      margin-top: 6px;
      padding-right: 4px;
      min-height: 14px;
    }

    /* ── Responsive ── */
    @media (min-width: 720px) {
      header       { padding: 20px 28px 18px; }
      .messages-wrap { padding: 28px 24px 8px; }
      .input-area  { padding: 14px 24px 24px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2L9 9H2l5.5 4-2 7L12 16l6.5 4-2-7L22 9h-7z"/></svg>
      </div>
      <div>
        <div class="header-title">Lumina</div>
        <div class="header-subtitle">AI Assistant</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="model-label">gpt-oss-120b</span>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages-wrap" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>How can I help?</h2>
      <p>Ask me anything — I'm here to assist you thoughtfully.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="useSuggestion(this)">Explain something to me</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Help me write something</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Answer a question</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Give me ideas</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-bar">
      <textarea
        id="input"
        placeholder="Message Lumina…"
        rows="1"
        maxlength="4000"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="send-btn" disabled title="Send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="char-hint" id="char-hint"></div>
  </div>

</div>

<script>
  const input    = document.getElementById('input');
  const sendBtn  = document.getElementById('send-btn');
  const msgWrap  = document.getElementById('messages');
  const empty    = document.getElementById('empty-state');
  const charHint = document.getElementById('char-hint');

  let history = [];   // [{role, content}]
  let loading = false;

  // ── Auto-resize textarea ──
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = input.value.trim() === '' || loading;
    const len = input.value.length;
    charHint.textContent = len > 3800 ? `${4000 - len} characters remaining` : '';
  });

  // ── Send on Enter (not Shift+Enter) ──
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) send();
    }
  });

  sendBtn.addEventListener('click', send);

  function useSuggestion(el) {
    input.value = el.textContent;
    input.dispatchEvent(new Event('input'));
    input.focus();
  }

  function hideEmpty() {
    if (empty) empty.style.display = 'none';
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      msgWrap.scrollTo({ top: msgWrap.scrollHeight, behavior: 'smooth' });
    });
  }

  function appendMessage(role, text) {
    hideEmpty();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const isUser = role === 'user';

    msg.innerHTML = `
      <div class="avatar">
        ${isUser
          ? `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
          : `<svg viewBox="0 0 24 24"><path d="M12 2L9 9H2l5.5 4-2 7L12 16l6.5 4-2-7L22 9h-7z"/></svg>`
        }
      </div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    msgWrap.appendChild(msg);
    scrollBottom();
    return msg;
  }

  function appendTyping() {
    hideEmpty();
    const msg = document.createElement('div');
    msg.className = 'message ai';
    msg.id = 'typing-msg';
    msg.innerHTML = `
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9 9H2l5.5 4-2 7L12 16l6.5 4-2-7L22 9h-7z"/></svg>
      </div>
      <div class="bubble typing-bubble">
        <span></span><span></span><span></span>
      </div>
    `;
    msgWrap.appendChild(msg);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  function appendError(msg) {
    hideEmpty();
    const el = document.createElement('div');
    el.className = 'message ai';
    el.innerHTML = `
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9 9H2l5.5 4-2 7L12 16l6.5 4-2-7L22 9h-7z"/></svg>
      </div>
      <div class="error-msg">${escapeHtml(msg)}</div>
    `;
    msgWrap.appendChild(el);
    scrollBottom();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function send() {
    const text = input.value.trim();
    if (!text || loading) return;

    loading = true;
    sendBtn.disabled = true;

    // Add to UI + history
    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    // Clear input
    input.value = '';
    input.style.height = 'auto';
    charHint.textContent = '';

    // Show typing
    appendTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        appendError(data.error || 'Something went wrong. Please try again.');
      } else {
        const reply = data.reply || '';
        appendMessage('ai', reply);
        history.push({ role: 'assistant', content: reply });

        // Show model name if returned
        if (data.model) {
          document.getElementById('model-label').textContent = data.model;
        }
      }
    } catch (err) {
      removeTyping();
      appendError('Network error — please check your connection and try again.');
    }

    loading = false;
    sendBtn.disabled = input.value.trim() === '';
    input.focus();
  }
</script>
</body>
</html>
